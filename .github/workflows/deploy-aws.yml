name: Deploy to AWS

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'client/**'
      - '.github/workflows/deploy-aws.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-north-1
  ECR_REPOSITORY: firsttest-api
  EB_APP_NAME: firsttest-api
  EB_ENV_NAME: firsttest-api

jobs:
  deploy-api:
    name: Build & deploy API (Elastic Beanstalk)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build, tag, and push image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f src/FirstTest.Api/Dockerfile \
            -t "$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" \
            -t "$REGISTRY/$ECR_REPOSITORY:latest" .
          docker push "$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker push "$REGISTRY/$ECR_REPOSITORY:latest"
      - name: Deploy new version to Elastic Beanstalk
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE="$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          printf '{"AWSEBDockerrunVersion":"1","Image":{"Name":"%s","Update":"true"},"Ports":[{"ContainerPort":8080,"HostPort":80}]}' "$IMAGE" > Dockerrun.aws.json
          BUCKET=$(aws elasticbeanstalk create-storage-location --query S3Bucket --output text)
          VERSION="gha-$(echo "$IMAGE_TAG" | cut -c1-8)-$(date +%s)"
          KEY="firsttest/$VERSION.json"
          aws s3 cp Dockerrun.aws.json "s3://$BUCKET/$KEY"
          aws elasticbeanstalk create-application-version \
            --application-name "$EB_APP_NAME" --version-label "$VERSION" \
            --source-bundle "S3Bucket=$BUCKET,S3Key=$KEY"
          aws elasticbeanstalk update-environment \
            --environment-name "$EB_ENV_NAME" --version-label "$VERSION"

          # update-environment is fire-and-forget: wait for the rollout and
          # verify the new version actually went live (EB rolls back to the
          # previous version on failure, so a green job != a successful deploy).
          echo "Waiting for environment update to complete..."
          aws elasticbeanstalk wait environment-updated --environment-name "$EB_ENV_NAME"
          LIVE=$(aws elasticbeanstalk describe-environments --environment-names "$EB_ENV_NAME" \
            --query 'Environments[0].VersionLabel' --output text)
          HEALTH=$(aws elasticbeanstalk describe-environments --environment-names "$EB_ENV_NAME" \
            --query 'Environments[0].Health' --output text)
          echo "Live version: $LIVE (expected $VERSION) — health: $HEALTH"
          if [ "$LIVE" != "$VERSION" ]; then
            echo "::error::Deploy failed: environment is on '$LIVE', not '$VERSION' (rolled back). Recent events:"
            aws elasticbeanstalk describe-events --environment-name "$EB_ENV_NAME" \
              --max-items 15 --query 'Events[].{Time:EventDate,Severity:Severity,Message:Message}' --output table
            exit 1
          fi
          if [ "$HEALTH" != "Green" ]; then
            echo "::error::Deployed '$VERSION' but environment health is '$HEALTH', not Green."
            exit 1
          fi
          echo "Deploy verified: $VERSION is live and healthy."

  deploy-client:
    name: Build & deploy client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: client/package-lock.json
      - name: Build client
        working-directory: client
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
        run: |
          npm ci
          npm run build
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Sync to S3
        run: aws s3 sync client/dist "s3://${{ vars.S3_BUCKET }}" --delete
      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}" --paths "/*"
