services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: firsttest
      POSTGRES_USER: firsttest
      POSTGRES_PASSWORD: firsttest
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U firsttest"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: src/FirstTest.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Postgres: "Host=db;Port=5432;Database=firsttest;Username=firsttest;Password=firsttest"
      Cors__AllowedOrigins: "http://localhost:5173,http://localhost:8081"
    ports:
      - "5080:8080"
    depends_on:
      db:
        condition: service_healthy

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        # Talk to the API container's published port from the browser.
        VITE_API_URL: "http://localhost:5080"
    ports:
      - "8081:8080"
    depends_on:
      - api

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin:/var/lib/pgadmin
      # Pre-registers the "FirstTest (local)" server on first launch.
      - ./infra/pgadmin/servers.json:/pgadmin4/servers.json:ro
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  pgadmin:
